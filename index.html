<head>
<meta charset="UTF-8">
<title>Pasapalabra – SDG 6 & 10 | Agua de Coco</title>

<!-- Montserrat Font -->
https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap

<style>
:root {
    --ods6: #00ADEF;
    --ods10: #DD1367;
    --yellow: #F9D342;
    --coco-blue: #009FE3;
    --coco-green: #1DB954;
    --bg: #F4FBFE;
    --text: #1a1a1a;
}

/* GENERAL */
body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    font-family: "Montserrat", sans-serif;
    text-align: center;
    overflow-x: hidden;
}

/* ---------------- START SCREEN ---------------- */
#start-screen {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: linear-gradient(135deg, var(--coco-blue), var(--coco-green));
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 1000;
}

#start-screen img {
    width: 380px;
    border-radius: 12px;
    box-shadow: 0 0 25px rgba(0,0,0,0.25);
}

#start-screen button {
    margin-top: 25px;
    padding: 15px 45px;
    background: var(--yellow);
    color: black;
    border: none;
    border-radius: 40px;
    font-size: 1.4em;
    font-weight: 700;
    cursor: pointer;
    transition: 0.3s;
}

#start-screen button:hover {
    background: white;
    transform: scale(1.05);
}

/* ---------------- TITLE ---------------- */
h1 {
    margin-top: 40px;
    font-size: 2.6em;
    font-weight: 700;
    background: linear-gradient(90deg, var(--ods6), var(--ods10));
    -webkit-background-clip: text;
    color: transparent;
}

/* ---------------- ROSCO ---------------- */
#rosco {
    width: 500px;
    height: 500px;
    margin: 30px auto;
    position: relative;
    animation: rotateRosco 18s linear infinite;
}

/* ROTATION ANIMATION */
@keyframes rotateRosco {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

.letter {
    width: 50px;
    height: 50px;
    background: var(--ods6);
    color: white;
    border-radius: 50%;
    position: absolute;
    line-height: 50px;
    font-weight: 700;
    border: 3px solid white;
    text-align: center;
    transition: 0.3s;
}

.active {
    background: var(--yellow);
    color: black;
    transform: scale(1.25);
}

.correct { background: #2ecc71 !important; }
.wrong   { background: #e63946 !important; }

/* ---------------- QUESTION BOX ---------------- */
#question-box {
    width: 70%;
    margin: 20px auto;
    padding: 25px;
    background: white;
    border-radius: 12px;
    box-shadow: 0 0 20px rgba(0,0,0,0.15);
}

#question {
    color: var(--ods10);
    font-weight: 700;
    font-size: 1.2em;
}

input {
    width: 60%;
    padding: 12px;
    border: 2px solid var(--ods6);
    border-radius: 8px;
    margin-top: 10px;
}

/* BUTTON STYLE */
.btn {
    padding: 12px 22px;
    margin: 10px;
    background: var(--ods6);
    color: white;
    border: none;
    border-radius: 8px;
    font-weight: 700;
    cursor: pointer;
}
.btn:hover {
    background: var(--ods10);
}

/* ---------------- END SCREEN ---------------- */
#end-screen {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: linear-gradient(135deg, var(--yellow), var(--coco-blue));
    padding-top: 150px;
    z-index: 2000;
}

#end-screen h2 {
    font-size: 3em;
    font-weight: 700;
}
#end-screen p {
    font-size: 1.6em;
    font-weight: 600;
}

/* ---------------- RESPONSIVE ---------------- */
@media (max-width: 768px) {

    #rosco {
        width: 320px;
        height: 320px;
    }

    .letter {
        width: 36px;
        height: 36px;
        line-height: 36px;
        font-size: 0.9em;
    }

    #question-box {
        width: 90%;
        padding: 20px;
    }

    input {
        width: 85%;
    }

    #start-screen img {
        width: 280px;
    }

    #start-screen button {
        font-size: 1.2em;
        padding: 12px 35px;
    }
}

</style>
</head>
<body>

<!-- ========= START SCREEN ========= -->
<div id="start-screen">
    <img src="https://i.ibb.co/Fkg2MNFs/portada-pasapalabra-agua.png" alt="Pasapalabra Agua de Coco">
    <button onclick="startGame()">START</button>
</div>

<!-- ========= GAME TITLE ========= -->
<h1>Pasapalabra – SDG 6 & 10</h1>

<!-- ========= ROSCO (DYNAMIC) ========= -->
<div id="rosco"></div>

<!-- ========= QUESTION AREA ========= -->
<div id="question-box">
    <p id="letter-display"><b>Letter:</b> A</p>
    <p id="question"></p>

    <input type="text" id="answer" placeholder="Type your answer…">

    <div>
        <button class="btn" onclick="checkAnswer()">Answer</button>
        <button class="btn" onclick="skip()">Pass</button>
    </div>

    <p id="score">Score: 0 correct</p>
</div>

<!-- ========= END SCREEN ========= -->
<div id="end-screen">
    <h2>🎉 Congratulations! 🎉</h2>
    <p>You completed the Pasapalabra – Agua de Coco Edition</p>
    <p id="final-score"></p>
</div>
<script>
// =============================
//   SONIDOS EN BASE64 (NO FALLAN EN IFRAME)
// =============================

// Sonido de acierto (ding)
const correctSound = new Audio("data:audio/mp3;base64,//uQxAAAAAAD...");
correctSound.volume = 0.7;

// Sonido de error (buzz)
const wrongSound = new Audio("data:audio/mp3;base64,//uQxAAAAAAD...");
wrongSound.volume = 0.7;


// =============================
//   LISTA COMPLETA DE PREGUNTAS
// =============================
const questions = [
    { letter:"A", word:"aquifer", hint:"An underground layer that stores water." },
    { letter:"B", word:"biodiversity", hint:"The variety of living things in nature." },
    { letter:"C", word:"clean water", hint:"Water that is safe to drink and use." },
    { letter:"D", word:"drought", hint:"A long period without rain." },
    { letter:"E", word:"equality", hint:"Everyone having the same rights." },
    { letter:"F", word:"filtration", hint:"Removing dirt from water." },
    { letter:"G", word:"groundwater", hint:"Water found under the ground." },
    { letter:"H", word:"hygiene", hint:"Practices to stay clean and healthy." },
    { letter:"I", word:"inequality", hint:"When opportunities are unfair." },
    { letter:"J", word:"justice", hint:"Fair treatment for everyone." },
    { letter:"K", word:"kidney", hint:"Organ that filters water in the body." },
    { letter:"L", word:"leak", hint:"Water escaping through a hole." },
    { letter:"M", word:"migration", hint:"People moving due to lack of water or resources." },
    { letter:"N", word:"nutrition", hint:"Food and water the body needs." },
    { letter:"O", word:"oasis", hint:"A place in the desert with water." },
    { letter:"P", word:"pollution", hint:"Harmful substances that dirty water or air." },
    { letter:"Q", word:"quality", hint:"How clean the water is." },
    { letter:"R", word:"river", hint:"A natural stream of flowing water." },
    { letter:"S", word:"sanitation", hint:"Clean wastewater and toilet systems." },
    { letter:"T", word:"tap water", hint:"Water that comes from a faucet." },
    { letter:"U", word:"undernourished", hint:"Not having enough food or water." },
    { letter:"V", word:"volunteer", hint:"Someone who helps without payment." },
    { letter:"W", word:"wastewater", hint:"Used water that needs cleaning." },
    { letter:"X", word:"xeriscaping", hint:"Gardening with plants that need little water." },
    { letter:"Y", word:"youth", hint:"Young people making change." },
    { letter:"Z", word:"zero inequality", hint:"Goal where everyone has equal opportunities." }
];

// =============================
//   VARIABLES
// =============================
let index = 0;
let score = 0;


// =============================
//   INICIO DEL JUEGO
// =============================
function startGame() {
    document.getElementById("start-screen").style.display = "none";
}


// =============================
//   CREACIÓN DINÁMICA DEL ROSCO
// =============================
const rosco = document.getElementById("rosco");
const radius = 200;  // más pequeño para móviles

questions.forEach((q, i) => {
    const angle = (i / 26) * 2 * Math.PI;
    const x = radius * Math.cos(angle) + 225;
    const y = radius * Math.sin(angle) + 225;

    const div = document.createElement("div");
    div.classList.add("letter");
    div.id = "L" + i;
    div.textContent = q.letter;
    div.style.left = x + "px";
    div.style.top = y + "px";

    rosco.appendChild(div);
});

// Activar primera letra
document.getElementById("L0").classList.add("active");
document.getElementById("question").textContent = questions[0].hint;


// =============================
//   COMPROBAR RESPUESTA
// =============================
function checkAnswer() {

    const user = document.getElementById("answer").value.trim().toLowerCase();
    const correct = questions[index].word.toLowerCase();
    const letter = document.getElementById("L" + index);

    if (user === correct) {
        letter.classList.add("correct");
        correctSound.play();
        score++;
        document.getElementById("score").textContent = "Score: " + score + " correct";
    } else {
        letter.classList.add("wrong");
        wrongSound.play();
        alert("Wrong! Correct answer: " + correct);
    }

    nextQuestion();
}

function skip() {
    nextQuestion();
}


// =============================
//   SIGUIENTE PREGUNTA
// =============================
function nextQuestion() {

    document.getElementById("answer").value = "";
    document.getElementById("L" + index).classList.remove("active");

    do {
        index++;
        if (index >= 26) {
            endGame();
            return;
        }
    } while (
        document.getElementById("L" + index).classList.contains("correct") ||
        document.getElementById("L" + index).classList.contains("wrong")
    );

    document.getElementById("L" + index).classList.add("active");
    document.getElementById("letter-display").innerHTML = "<b>Letra:</b> " + questions[index].letter.toUpperCase();
    document.getElementById("question").textContent = questions[index].hint;
}


// =============================
//   FIN DEL JUEGO
// =============================
function endGame() {
    document.getElementById("end-screen").style.display = "block";
    document.getElementById("final-score").textContent =
        "Your score: " + score + "/26";
}

</script>
</body>
</html>
